# WhimprFlow CI
#
# Rust workspace matrix for supported desktop platforms plus the ui/ frontend.
# See perfect-todo.md's "Cross-cutting: what 'elite' also requires" section for why
# this exists: it's the highest-leverage non-feature investment in the repo.
name: CI

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry & build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ matrix.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-${{ matrix.os }}-

      # --- Windows only: bindgen (used by whisper-rs / llama-cpp-sys-2) needs
      # libclang; point it at the LLVM install GitHub's windows-latest runner
      # already ships, matching the README's own build note. ---
      - name: Point bindgen at LLVM (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $llvmBin = "C:\Program Files\LLVM\bin"
          if (Test-Path $llvmBin) {
            echo "LIBCLANG_PATH=$llvmBin" >> $env:GITHUB_ENV
          }

      - name: cargo build --workspace
        run: cargo build --workspace

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo test --workspace --all-targets
        run: cargo test --workspace --all-targets

      - name: cargo clippy --workspace --all-targets
        run: cargo clippy --workspace --all-targets -- -D warnings

  ui:
    name: UI (frontend)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        working-directory: ui
        run: npm ci

      - name: Build (tsc --noEmit && vite build)
        working-directory: ui
        run: npm run build
