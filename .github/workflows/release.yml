name: Release Desktop Builds

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to create or update, for example v0.1.0
        required: true
        type: string

permissions:
  contents: write

jobs:
  package:
    name: Package (${{ matrix.platform }})
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        working-directory: ui
        run: npm ci

      # Drafts make every tagged build reviewable before a human publishes it.
      # Signing and notarization credentials can be added as repository secrets later.
      # tauri.conf.json points at a self-signed "WhimprFlow Dev" identity for LOCAL
      # builds (so TCC persists privacy grants across rebuilds  -  see
      # src-tauri/setup-signing.sh). CI runners don't have that cert, so fall back
      # to ad-hoc signing here. A future Developer ID secret can override both.
      - name: Build and upload draft release assets
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: "-"
        with:
          projectPath: ui
          tauriScript: npm exec tauri
          tagName: ${{ inputs.tag || github.ref_name }}
          releaseName: WhimprFlow ${{ inputs.tag || github.ref_name }}
          releaseDraft: true
          generateReleaseNotes: true
